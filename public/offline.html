<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | ART - Adaptive Rural Tourism</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 1.75rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid #1a1a1a;
      background: transparent;
      color: #1a1a1a;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
    }
    .retry-btn:hover {
      background: #1a1a1a;
      color: #fff;
    }
    .location {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#9968;</div>
    <h1>You're offline</h1>
    <p>
      It seems you've wandered beyond the reach of the internet.
      Perhaps the mountains have called you to disconnect for a while.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    <p class="location">
      ART · Chachogi · 2,300m
    </p>
  </div>
</body>
</html>
