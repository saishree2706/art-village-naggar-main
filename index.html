<html lang="en">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Default meta tags (overridden by react-helmet-async per page) -->
    <title>Adaptive Rural Tourism | Rethinking Rural Living</title>
    <meta name="description" content="A community organization rethinking and redesigning village spaces. Volunteer programs, creative collaborations, and authentic Himalayan experiences in Chachogi village, Kullu Valley." />

    <meta name="theme-color" content="#1a1a1a" />
    <meta name="msapplication-TileColor" content="#1a1a1a" />

    <meta property="og:site_name" content="Adaptive Rural Tourism" />
    <meta property="og:title" content="Adaptive Rural Tourism | Rethinking Rural Living" />
    <meta property="og:description" content="A community organization rethinking village spaces. Volunteer programs, creative collaborations, and authentic Himalayan experiences. Not a hotel — a movement." />

    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://artvillagenaggar.com/" />
    <meta property="og:image" content="https://artvillagenaggar.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ART - Adaptive Rural Tourism - Community initiatives in the Himalayas" />

    <link rel="apple-touch-icon" sizes="180x180" href="/ART_black_logo.svg" />
    <link rel="manifest" href="/site.webmanifest" />
